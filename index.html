<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Icon Recomposer</title>
  <!-- Anonymous, privacy-friendly usage analytics (TelemetryDeck Web SDK).
       Sends one pageview per load; no cookies. Signals from localhost/file
       are auto-flagged as test mode. -->
  <script src="https://cdn.telemetrydeck.com/websdk/telemetrydeck.min.js"
          data-app-id="11D5C3D9-D37D-4A87-B22D-B3DAD39E31D8"></script>
  <link rel="icon" type="image/png" href="assets/favicon-64.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand"><img class="brand-icon" src="assets/brand-64.png" alt="" />Icon&nbsp;Recomposer <span class="version" id="app-version"></span></div>
    <input id="doc-name" class="doc-name" type="text" placeholder="icon"
           title="Document name — used for the export / save filename"
           autocomplete="off" spellcheck="false" />

    <div class="toolbar">
      <button id="btn-new" class="tbtn" title="New document">New</button>

      <label class="tbtn" for="file-open">Open</label>
      <input id="file-open" type="file" accept=".json,.svg,.xml,application/json,image/svg+xml,text/xml" hidden />

      <button id="btn-save" class="tbtn" title="Save project (.json)">Save</button>

      <label class="tbtn" for="file-import">Import</label>
      <input id="file-import" type="file" accept=".json,.svg,.xml,application/json,image/svg+xml,text/xml" hidden />

      <div class="dropdown">
        <button id="btn-export" class="tbtn" aria-haspopup="true">Export ▾</button>
        <div class="menu" id="export-menu" hidden>
          <button data-export="png-transparent">PNG · transparent</button>
          <button data-export="png-bg">PNG · with background</button>
          <button data-export="vd">VectorDrawable XML</button>
          <button data-export="svg">SVG</button>
          <button data-export="project">Project JSON</button>
          <button data-export="share">Copy share link</button>
        </div>
      </div>

      <span class="spacer"></span>
      <a id="privacy-link" class="privacy-link"
         href="https://iboalali.com/app/icon_recomposer/privacy/?utm_source=icon-recomposer&amp;utm_medium=app"
         target="_blank" rel="noopener noreferrer"
         title="Privacy Policy">Privacy</a>
      <button id="btn-undo" class="tbtn icon" title="Undo (Ctrl+Z)">⟲</button>
      <button id="btn-redo" class="tbtn icon" title="Redo (Ctrl+Shift+Z)">⟳</button>
    </div>
  </header>

  <main class="workspace">
    <!-- LEFT: layers -->
    <aside class="panel" id="layers-panel">
      <div class="panel-head">
        <h2>Layers</h2>
      </div>
      <ul id="layer-list" class="layer-list"></ul>
      <p class="hint">Top of the list paints last (front-most). Ctrl/⌘- or Shift-click to select multiple.</p>
    </aside>

    <!-- CENTER: canvas -->
    <section class="stage" id="stage">
      <div class="canvas-wrap" id="canvas-wrap">
        <div class="checker" id="checker"></div>
        <div class="preview" id="preview"></div>
        <svg class="selection-overlay" id="selection-overlay" preserveAspectRatio="xMidYMid meet" hidden></svg>
        <div class="light-overlay" id="light-overlay">
          <div class="light-handle" id="light-handle" title="Drag to move the light"></div>
        </div>
      </div>
    </section>

    <!-- RIGHT: inspector -->
    <aside class="panel" id="inspector">
      <!-- Scene panel (nothing selected) -->
      <div id="scene-panel">
        <div class="panel-head"><h2>Scene</h2></div>

        <fieldset class="group">
          <legend>Light</legend>
          <label class="row">
            <span>Type</span>
            <select id="light-type">
              <option value="point">Point (radial)</option>
              <option value="distant">Distant (linear)</option>
              <option value="off">Off (no light)</option>
            </select>
          </label>
          <label class="row" id="row-light-x">
            <span>Position X</span>
            <input id="light-x" type="number" step="0.5" class="num" />
          </label>
          <label class="row" id="row-light-y">
            <span>Position Y</span>
            <input id="light-y" type="number" step="0.5" class="num" />
          </label>
          <label class="row" id="row-azimuth">
            <span>Azimuth</span>
            <input id="light-azimuth" type="range" min="0" max="360" step="1" />
            <output id="out-azimuth"></output>
          </label>
          <label class="row" id="row-elevation">
            <span>Elevation</span>
            <input id="light-elevation" type="range" min="0" max="90" step="1" />
            <output id="out-elevation"></output>
          </label>
          <label class="row" id="row-intensity">
            <span>Intensity</span>
            <input id="light-intensity" type="range" min="0" max="2" step="0.01" />
            <output id="out-intensity"></output>
          </label>
        </fieldset>

        <fieldset class="group">
          <legend>Canvas</legend>
          <label class="row">
            <span>Width</span>
            <input id="canvas-w" type="number" min="1" step="1" class="num" />
          </label>
          <label class="row">
            <span>Height</span>
            <input id="canvas-h" type="number" min="1" step="1" class="num" />
          </label>
          <label class="row">
            <span>Link W/H</span>
            <input id="canvas-lock" type="checkbox" checked
                   title="Keep width and height in the same ratio when resizing" />
          </label>
          <div class="row">
            <span>Presets</span>
            <div class="presets">
              <button type="button" class="chip preset-size" data-size="24">24</button>
              <button type="button" class="chip preset-size" data-size="108">108</button>
              <button type="button" class="chip preset-size" data-size="512">512</button>
              <button type="button" class="chip preset-size" data-size="1024">1024</button>
            </div>
          </div>
          <label class="row">
            <span>Scale contents</span>
            <input id="canvas-scale" type="checkbox" checked
                   title="Scale all layers and the light to fit the new canvas size" />
          </label>
          <label class="row">
            <span>Transparent</span>
            <input id="bg-transparent" type="checkbox" />
          </label>
          <label class="row" id="row-bg-color">
            <span>Background</span>
            <button id="bg-color" type="button" class="swatch"></button>
          </label>
          <label class="row">
            <span>PNG size</span>
            <input id="png-size" type="number" min="16" step="1" class="num" />
            <span class="unit">px</span>
          </label>
        </fieldset>
      </div>

      <!-- Layer panel (a layer is selected) -->
      <div id="layer-panel" hidden>
        <div class="panel-head">
          <h2 id="layer-panel-title">Layer</h2>
          <button id="layer-deselect" class="link" title="Back to scene">Scene ▸</button>
        </div>

        <label class="row" id="row-layer-name">
          <span>Name</span>
          <input id="layer-name" type="text" />
        </label>

        <fieldset class="group">
          <legend>Position</legend>
          <label class="row">
            <span>X</span>
            <input id="layer-x" type="number" step="0.5" class="num"
                   title="Left edge of the layer in canvas units (may go off-canvas)" />
          </label>
          <label class="row">
            <span>Y</span>
            <input id="layer-y" type="number" step="0.5" class="num"
                   title="Top edge of the layer in canvas units (may go off-canvas)" />
          </label>
        </fieldset>

        <fieldset class="group">
          <legend>Scale</legend>
          <div class="row">
            <span>Link X / Y</span>
            <button id="scale-link" type="button" class="link" aria-pressed="true"
                    title="Link X and Y scale (uniform). Click to unlock independent axes.">🔗 Linked</button>
          </div>
          <label class="row" id="row-scale">
            <span>Scale %</span>
            <input id="layer-scale" type="number" step="1" min="1" class="num"
                   title="Resize the layer in place. 100 = original. The layer may extend off-canvas; its path data is preserved." />
          </label>
          <label class="row" id="row-scale-x" hidden>
            <span>X %</span>
            <input id="layer-scale-x" type="number" step="1" min="1" class="num"
                   title="Horizontal scale in place. 100 = original (may go off-canvas)." />
          </label>
          <label class="row" id="row-scale-y" hidden>
            <span>Y %</span>
            <input id="layer-scale-y" type="number" step="1" min="1" class="num"
                   title="Vertical scale in place. 100 = original (may go off-canvas)." />
          </label>
          <div class="row">
            <span>Flip</span>
            <div class="presets">
              <button id="flip-h" type="button" class="chip" aria-pressed="false"
                      title="Flip horizontally (mirror left ↔ right)">⇆ H</button>
              <button id="flip-v" type="button" class="chip" aria-pressed="false"
                      title="Flip vertically (mirror top ↔ bottom)">⇅ V</button>
            </div>
          </div>
        </fieldset>

        <fieldset class="group">
          <legend>Material</legend>
          <label class="row">
            <span>Base color</span>
            <button id="mat-color" type="button" class="swatch"></button>
          </label>
          <label class="row">
            <span>Opacity</span>
            <input id="mat-alpha" type="range" min="0" max="1" step="0.01" />
            <output id="out-alpha"></output>
          </label>
          <div class="row">
            <span>Fill</span>
            <div class="seg">
              <label><input type="radio" name="fillmode" value="solid" /> Solid</label>
              <label><input type="radio" name="fillmode" value="embossed" /> Embossed</label>
            </div>
          </div>
          <label class="row" id="row-emboss">
            <span>Emboss</span>
            <input id="mat-emboss" type="range" min="0" max="2" step="0.01" />
            <output id="out-emboss"></output>
          </label>
          <label class="row" id="row-sheen">
            <span>Sheen</span>
            <input id="mat-sheen-on" type="checkbox" />
            <input id="mat-sheen" type="range" min="0" max="1" step="0.01" />
          </label>
          <label class="row">
            <span>Fill rule</span>
            <select id="mat-fillrule">
              <option value="nonZero">nonZero</option>
              <option value="evenOdd">evenOdd</option>
            </select>
          </label>
        </fieldset>

        <fieldset class="group">
          <legend>Cast shadow</legend>
          <label class="row">
            <span>Enabled</span>
            <input id="shadow-on" type="checkbox" />
          </label>
          <label class="row">
            <span>Opacity</span>
            <input id="shadow-opacity" type="range" min="0" max="1" step="0.01" />
          </label>
          <label class="row">
            <span>Spread</span>
            <input id="shadow-spread" type="range" min="0" max="1" step="0.01" />
          </label>
          <label class="row">
            <span>Distance</span>
            <input id="shadow-distance" type="range" min="0" max="3" step="0.05"
                   title="How far the shadow is thrown (the layer's apparent height); 1 = the auto length from the light" />
            <output id="out-shadow-distance"></output>
          </label>
          <label class="row">
            <span>Clip to layers</span>
            <input id="shadow-clip" type="checkbox"
                   title="Show the shadow only where it lands on layers below, not on the background" />
          </label>
        </fieldset>

        <fieldset class="group">
          <legend>Stroke (passthrough)</legend>
          <label class="row">
            <span>Enabled</span>
            <input id="stroke-on" type="checkbox" />
          </label>
          <label class="row">
            <span>Color</span>
            <button id="stroke-color" type="button" class="swatch"></button>
          </label>
          <label class="row">
            <span>Width</span>
            <input id="stroke-width" type="number" min="0" step="0.1" class="num" />
          </label>
          <label class="row">
            <span>Fill</span>
            <select id="mat-fillnone">
              <option value="false">Filled</option>
              <option value="true">None (stroke only)</option>
            </select>
          </label>
        </fieldset>
      </div>
    </aside>
  </main>

  <div id="toast" class="toast" hidden></div>

  <script type="module" src="ui.js"></script>
</body>
</html>
