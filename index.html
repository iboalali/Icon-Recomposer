<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Icon Recomposer</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font: 16px/1.6 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #0f1115;
      color: #e6e8ec;
      padding: 2rem;
    }
    main { max-width: 36rem; text-align: center; }
    h1 { font-size: 2rem; margin: 0 0 .5rem; letter-spacing: -0.02em; }
    p { color: #9aa0aa; margin: .5rem 0; }
    .badge {
      display: inline-block;
      margin-top: 1.5rem;
      padding: .35rem .8rem;
      border: 1px solid #2a2f3a;
      border-radius: 999px;
      font-size: .8rem;
      color: #c0c5cf;
    }
  </style>
</head>
<body>
  <main>
    <h1>Icon Recomposer</h1>
    <p>A browser tool that loads vector artwork (SVG or Android VectorDrawable),
       applies a subtle 3D emboss driven by a single movable light, and exports
       to PNG, VectorDrawable XML, or a re-editable project.</p>
    <p class="badge">In development</p>
  </main>
</body>
</html>
